<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --tm-blue:        #026CDF;  /* Ticketmaster brand blue */
      --tm-blue-bright: #3b9bff;
      --tm-blue-dark:   #0250b5;
    }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0b1020;
      color: #e2e8f0;
      padding: 18px;
    }

    header { margin-bottom: 16px; }
    .title { font-size: 16px; font-weight: 700; color: var(--tm-blue-bright); }
    .subtitle { font-size: 11px; color: #64748b; margin-top: 2px; }

    .card {
      background: #141c2e;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .card h3 {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 9px;
    }

    .field { margin-bottom: 11px; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
    textarea, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      background: #0e1626;
      border: 1px solid #233047;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      font-family: inherit;
    }
    textarea {
      resize: vertical;
      min-height: 72px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      line-height: 1.45;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--tm-blue); }
    .hint { font-size: 10px; color: #4b5563; margin-top: 4px; }

    .inline { display: flex; gap: 11px; }
    .inline .field { flex: 1; }

    .status-empty { font-size: 13px; color: #64748b; }
    .url-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 0;
      border-bottom: 1px solid #233047;
    }
    .url-row:last-child { border-bottom: none; }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #374151;
      flex-shrink: 0;
    }
    .dot.watching  { background: var(--tm-blue-bright); animation: pulse 1.2s ease-in-out infinite; }
    .dot.soldout   { background: #f87171; }
    .dot.available { background: #4ade80; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

    .url-info { min-width: 0; flex: 1; }
    .url-name {
      font-size: 12px;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .url-meta { font-size: 10px; color: #64748b; }

    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    button:not(:disabled):hover { opacity: 0.85; }
    .btn-start { background: var(--tm-blue); color: #fff; }
    .btn-stop  { background: #1a2435; color: #9fb3cc; border: 1px solid #2b3a52; }
    .btn-mute  { background: #991b1b; color: #fecaca; margin-top: 9px; display: none; }
    .btn-add {
      background: #13233f;
      color: #93c5fd;
      border: 1px solid #1e3a5f;
      font-size: 12px;
      padding: 8px;
      margin-top: 7px;
    }

    .saved-flash { font-size: 11px; color: #4ade80; margin-left: 6px; }
    .add-flash { font-size: 11px; color: var(--tm-blue-bright); margin-left: 6px; }
  </style>
</head>
<body>
  <header>
    <div class="title">Ticketmaster Watcher</div>
    <div class="subtitle">Monitora várias páginas e avisa quando o ingresso libera</div>
  </header>

  <div class="card">
    <h3>Configuração</h3>
    <div class="field">
      <label for="urls">URLs para monitorar (uma por linha)</label>
      <textarea id="urls" placeholder="https://www.ticketmaster.com.br/event/...&#10;https://www.ticketmaster.com/event/..."></textarea>
      <button id="add-current-btn" class="btn-add">+ Adicionar URL atual<span id="add-flash" class="add-flash"></span></button>
      <div class="hint">Cada URL abre numa aba em segundo plano e recarrega no intervalo definido.</div>
    </div>
    <div class="inline">
      <div class="field">
        <label for="keyword">Palavra de "esgotado"</label>
        <input type="text" id="keyword" placeholder="esgotado">
      </div>
      <div class="field">
        <label for="interval">Intervalo (s)</label>
        <input type="number" id="interval" min="1" step="1" placeholder="5">
      </div>
    </div>
    <button id="save-btn" class="btn-stop" style="margin-top:4px;">Salvar configuração<span id="saved-flash" class="saved-flash"></span></button>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status-list"><div class="status-empty">Inativo — configure as URLs e inicie.</div></div>
  </div>

  <button id="toggle-btn" class="btn-start">Iniciar monitoramento</button>
  <button id="mute-btn" class="btn-mute">Parar alerta</button>

  <script src="popup.js"></script>
</body>
</html>
